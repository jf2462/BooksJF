<title>Grandes Novelas · Guardian & Economist</title>

*{box-sizing:border-box;margin:0;padding:0}
body.dark{--bg:#0f0e0c;--bg2:#1a1815;--bg3:#141210;--border:#2a2420;--border2:#1e1c19;--text:#e8e0d0;--text2:#7a6f60;--text3:#4a4038;--accent:#c8a96e;--accent2:#8a6a30;--heading:#f5e6c8;--muted:#2e2a24;--src-g:#3a6a3a;--src-e:#3a4a6a}
body.light{--bg:#faf8f4;--bg2:#f0ece4;--bg3:#f5f2ec;--border:#ddd8ce;--border2:#e8e4dc;--text:#2a2218;--text2:#7a6a58;--text3:#b0a898;--accent:#8a5a18;--accent2:#c8a96e;--heading:#1a1208;--muted:#c8c0b4;--src-g:#2a5a2a;--src-e:#2a3a5a}
body{background:var(--bg);color:var(--text);font-family:'Libre Baskerville',serif;min-height:100vh;font-size:13px;transition:background .25s,color .25s}
.header{padding:20px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;transition:background .25s,border-color .25s}
.header-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.titles h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:var(--heading);margin-bottom:2px}
.titles p{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.header-row2{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.header-row3{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* Source toggle */
.src-btns{display:flex;gap:0;flex-shrink:0}
.src-btn{padding:7px 14px;font-family:'Libre Baskerville',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .2s}
.src-btn:first-child{border-radius:0}
.src-btn.active-g{background:#1a2e1a;color:#7ac87a;border-color:#3a6a3a}
body.light .src-btn.active-g{background:#e8f4e8;color:#2a6a2a;border-color:#5a9a5a}
.src-btn.active-e{background:#1a1e2e;color:#7a9ac8;border-color:#3a4a6a}
body.light .src-btn.active-e{background:#e8ecf4;color:#2a3a7a;border-color:#4a5a9a}

/* Controls */
.search-box{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 12px;font-family:'Libre Baskerville',serif;font-size:12px;width:200px;outline:none;transition:border-color .2s,background .25s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text3)}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:7px 10px;font-family:'Libre Baskerville',serif;font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.btn:hover,.btn.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}
.count{font-size:10px;color:var(--text3);margin-left:auto}

/* Theme toggle */
.theme-btn{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);padding:6px 11px;cursor:pointer;font-family:'Libre Baskerville',serif;font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Legend */
.legend{display:flex;gap:6px;flex-wrap:wrap;padding:9px 20px;border-bottom:1px solid var(--border2);background:var(--bg);transition:background .25s,border-color .25s}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);cursor:pointer;padding:2px 6px;border:1px solid transparent;transition:all .15s}
.legend-item:hover,.legend-item.active{border-color:var(--border);color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-hint{font-size:10px;color:var(--text3);margin-left:auto}

/* Table */
table{width:100%;border-collapse:collapse}
thead th{font-family:'Playfair Display',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:11px 12px;border-bottom:1px solid var(--border2);text-align:left;cursor:pointer;user-select:none;white-space:nowrap;background:var(--bg);transition:color .2s,background .25s}
thead th:hover{color:var(--accent)}
thead th.sorted{color:var(--accent)}
thead th:first-child{width:52px;text-align:center}
th.right,td.right{text-align:center}
th.rtime{width:80px}
th.goodreads{width:100px}
th.lang{width:85px}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody tr.top3-row{border-left:3px solid var(--lc,#888)}
td{padding:9px 12px;vertical-align:middle}

.rank{text-align:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--muted)}
.rank.t10{color:var(--accent)}
.rank.t25{color:var(--accent2)}

.t-title{font-family:'Playfair Display',serif;font-size:13px;color:var(--heading);line-height:1.3}
.t-author{font-size:11px;color:var(--text2);font-style:italic;margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 5px;margin-left:6px;letter-spacing:.5px;vertical-align:middle;opacity:.9}
.both-badge{font-size:9px;padding:1px 5px;margin-left:5px;background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.3);vertical-align:middle;letter-spacing:.5px}

.lang-tag{display:inline-block;font-size:9px;padding:2px 6px;letter-spacing:.5px;text-transform:uppercase}

.gr-wrap{display:inline-flex;align-items:center;gap:6px;justify-content:center}
.gr-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--accent);min-width:28px;text-align:right}
.bar-bg{background:var(--border);height:3px;width:44px;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}

.rt{font-family:'Playfair Display',serif;font-size:12px;color:var(--text2);text-align:center}

.no-results{padding:40px;text-align:center;color:var(--text3);font-style:italic}
</style>
</head>

</table>

// Normalize title for matching
function norm(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim()}
const gTitles=new Set(G.map(b=>norm(b[1])));
const eTitles=new Set(E.map(b=>norm(b[1])));
function inBoth(title){const n=norm(title);return gTitles.has(n)&&eTitles.has(n)}

// Precompute top3 per lang
function calcTop3(data){
  const t={};
  Object.keys(LANGS).forEach(lk=>{
    t[lk]=data.filter(b=>b[4]===lk).sort((a,b)=>a[0]-b[0]).slice(0,3).map(b=>b[0]);
  });
  return t;
}
const gTop3=calcTop3(G);
const eTop3=calcTop3(E);

function getTop3Pos(rank,lang,top3){const a=top3[lang];return a?a.indexOf(rank):-1}

function fmtTime(m){
  if(!m||m<1)return '< 1m';
  if(m<60)return m+'m';
  const d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=m%60;
  if(d>0)return d+'d '+(h>0?h+'h':'');
  return h+'h'+(mn>0?' '+mn+'m':'');
}

let src='g',sortKey='rank',sortDir=1,activeLang=null,isDark=true;

function setSource(s){
  src=s;
  activeLang=null;
  document.querySelectorAll('.legend-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('btn-g').className='src-btn'+(s==='g'?' active-g':'');
  document.getElementById('btn-e').className='src-btn'+(s==='e'?' active-e':'');
  const rtBtn=document.getElementById('btn-rt');
  const rtTh=document.getElementById('th-rt');
  if(s==='e'){rtBtn.style.display='';rtTh.style.display='';}
  else{rtBtn.style.display='none';rtTh.style.display='none';if(sortKey==='rt'){sortKey='rank';sortDir=1;}}
  const sub=document.getElementById('subtitle');
  if(s==='g')sub.textContent='The Guardian 2026 · 100 libros · 172 expertos';
  else sub.textContent='The Economist · 500 libros · Los más recomendados';
  buildLegend(s==='g'?G:E);
  render();
}

function setSort(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  const map={rank:'btn-rank',rating:'btn-rating',title:'btn-title',lang:'btn-lang',rt:'btn-rt'};
  if(map[key])document.getElementById(map[key]).classList.add('active');
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  render();
}

function toggleLang(lk){
  activeLang=activeLang===lk?null:lk;
  document.querySelectorAll('.legend-item').forEach(el=>el.classList.remove('active'));
  if(activeLang)document.querySelector(`.legend-item[data-lang="${activeLang}"]`).classList.add('active');
  render();
}

function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  document.body.classList.toggle('light',!isDark);
  document.getElementById('t-icon').textContent=isDark?'☀️':'🌙';
  document.getElementById('t-label').textContent=isDark?'Claro':'Oscuro';
}

function buildLegend(data){
  const counts={};
  data.forEach(b=>{counts[b[4]]=(counts[b[4]]||0)+1;});
  document.getElementById('legend').innerHTML=
    Object.entries(LANGS)
      .filter(([lk])=>counts[lk]>0)
      .map(([lk,lv])=>`<div class="legend-item" data-lang="${lk}" onclick="toggleLang('${lk}')">
        <div class="dot" style="background:${lv.color}"></div>${lv.label}<span style="opacity:.4;margin-left:2px">(${counts[lk]||0})</span></div>`)
      .join('')+`<span class="legend-hint">Clic para filtrar</span>`;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const data=(src==='g'?G:E).map(b=>({
    rank:b[0],title:b[1],author:b[2],rating:b[3],lang:b[4],rt:b[5]||0
  }));
  const top3=src==='g'?gTop3:eTop3;

  let rows=data.filter(b=>
    (!q||(b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)))&&
    (!activeLang||b.lang===activeLang)
  );

  rows.sort((a,b)=>{
    let av=a[sortKey],bv=b[sortKey];
    if(sortKey==='title'||sortKey==='lang')return av.localeCompare(bv)*sortDir;
    return(av-bv)*sortDir;
  });

  document.getElementById('count').textContent=rows.length+' título'+(rows.length!==1?'s':'');
  document.getElementById('no-results').style.display=rows.length?'none':'block';

  const showTime=src==='e';
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML='';return;}

  tbody.innerHTML=rows.map(b=>{
    const lc=LANGS[b.lang].color;
    const t3=getTop3Pos(b.rank,b.lang,top3);
    const isTop3=t3>=0;
    const rankClass=b.rank<=10?'t10':b.rank<=25?'t25':'';
    const rowClass=isTop3?'top3-row':'';
    const barW=Math.round(((b.rating-3.0)/2.0)*100);
    const badge=isTop3?`<span class="badge" style="background:${lc}22;color:${lc};border:1px solid ${lc}44">${MEDALS[t3]} #${t3+1} ${LANGS[b.lang].label}</span>`:'';
    const bothBadge=inBoth(b.title)?'<span class="both-badge">📚 Ambas</span>':'';
    const rtCell=showTime?`<td class="rt right">${fmtTime(b.rt)}</td>`:'';
    return `<tr class="${rowClass}" style="--lc:${lc}">
      <td class="rank ${rankClass}">${b.rank}</td>
      <td><div class="t-title">${b.title}${badge}${bothBadge}</div><div class="t-author">${b.author}</div></td>
      <td class="right"><span class="lang-tag" style="background:${lc}18;color:${lc};border:1px solid ${lc}33">${LANGS[b.lang].label}</span></td>
      <td class="right"><div class="gr-wrap"><span class="gr-num">${b.rating.toFixed(2)}</span><div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:linear-gradient(90deg,${lc}88,${lc})"></div></div></div></td>
      ${rtCell}
    </tr>`;
  }).join('');
}

// Init
buildLegend(G);
document.getElementById('btn-rank').classList.add('active');
render();
</script>
