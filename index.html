<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Guardian · 100 Best Novels of All Time</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── TOKENS ── */
  body.dark {
    --bg:        #0f0e0c;
    --bg2:       #1a1815;
    --bg3:       #141210;
    --border:    #2a2420;
    --border2:   #1e1c19;
    --text:      #e8e0d0;
    --text2:     #7a6f60;
    --text3:     #4a4038;
    --accent:    #c8a96e;
    --accent2:   #8a6a30;
    --heading:   #f5e6c8;
    --rank-muted:#2e2a24;
  }
  body.light {
    --bg:        #faf8f4;
    --bg2:       #f0ece4;
    --bg3:       #f5f2ec;
    --border:    #ddd8ce;
    --border2:   #e8e4dc;
    --text:      #2a2218;
    --text2:     #7a6a58;
    --text3:     #b0a898;
    --accent:    #8a5a18;
    --accent2:   #c8a96e;
    --heading:   #1a1208;
    --rank-muted:#c8c0b4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Libre Baskerville', serif;
    min-height: 100vh;
    font-size: 13px;
    transition: background 0.25s, color 0.25s;
  }

  /* ── HEADER ── */
  .header {
    padding: 24px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    transition: background 0.25s, border-color 0.25s;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 900; color: var(--heading); margin-bottom: 3px; }
  .header p  { font-size: 10px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Libre Baskerville', serif;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-icon { font-size: 13px; }

  /* ── CONTROLS ── */
  .controls { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .search-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    font-family: 'Libre Baskerville', serif;
    font-size: 12px;
    width: 210px;
    outline: none;
    transition: border-color 0.2s, background 0.25s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  .sort-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 10px;
    font-family: 'Libre Baskerville', serif;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .sort-btn:hover, .sort-btn.active { background: var(--bg3); color: var(--accent); border-color: var(--accent); }
  .count-label { font-size: 10px; color: var(--text3); margin-left: auto; }

  /* ── LEGEND ── */
  .lang-legend {
    display: flex; gap: 7px; flex-wrap: wrap;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border2);
    background: var(--bg);
    transition: background 0.25s, border-color 0.25s;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text2);
    cursor: pointer; padding: 3px 7px;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .legend-item:hover, .legend-item.active { border-color: var(--border); color: var(--accent); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-hint { font-size: 10px; color: var(--text3); margin-left: auto; }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: 'Playfair Display', serif;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); padding: 12px 12px;
    border-bottom: 1px solid var(--border2);
    text-align: left; cursor: pointer; user-select: none; white-space: nowrap;
    background: var(--bg);
    transition: color 0.2s, background 0.25s;
  }
  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th:first-child { width: 52px; text-align: center; }
  thead th:nth-child(4) { text-align: center; width: 95px; }
  thead th:nth-child(3) { width: 90px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.top3-row { border-left: 3px solid var(--lang-color, #888); }

  td { padding: 10px 12px; vertical-align: middle; transition: none; }

  .rank { text-align: center; font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--rank-muted); }
  .rank.top10 { color: var(--accent); }
  .rank.top25 { color: var(--accent2); }

  .title-col .title { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--heading); line-height: 1.3; }
  .title-col .author { font-size: 11px; color: var(--text2); font-style: italic; margin-top: 1px; }

  .top3-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; padding: 1px 5px; margin-left: 6px;
    letter-spacing: 0.5px; vertical-align: middle; opacity: 0.9;
  }

  .lang-cell { text-align: center; }
  .lang-tag { display: inline-block; font-size: 9px; padding: 2px 6px; letter-spacing: 0.5px; text-transform: uppercase; }

  .rating-cell { text-align: center; }
  .rating-inner { display: inline-flex; align-items: center; gap: 6px; }
  .rating-num { font-family: 'Playfair Display', serif; font-size: 13px; color: var(--accent); min-width: 28px; text-align: right; }
  .bar-bg { background: var(--border); height: 3px; width: 48px; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }

  .no-results { padding: 40px; text-align: center; color: var(--text3); font-style: italic; }
</style>
</head>
<body class="dark">

<div class="header">
  <div class="header-top">
    <div>
      <h1>The Guardian · 100 Best Novels of All Time</h1>
      <p>Mayo 2026 · 172 autores, críticos y académicos · Top 3 por idioma destacado</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
      <span class="toggle-icon" id="toggle-icon">☀️</span>
      <span id="toggle-label">Modo claro</span>
    </button>
  </div>
  <div class="controls">
    <input class="search-box" type="text" id="search" placeholder="Buscar título o autor..." oninput="render()">
    <button class="sort-btn active" id="btn-rank"   onclick="setSort('rank')">Ranking</button>
    <button class="sort-btn"        id="btn-rating" onclick="setSort('rating')">Goodreads</button>
    <button class="sort-btn"        id="btn-title"  onclick="setSort('title')">Título A–Z</button>
    <button class="sort-btn"        id="btn-lang"   onclick="setSort('lang')">Idioma</button>
    <span class="count-label" id="count-label">100 títulos</span>
  </div>
</div>

<div class="lang-legend" id="lang-legend"></div>

<table>
  <thead>
    <tr>
      <th onclick="setSort('rank')">#</th>
      <th onclick="setSort('title')">Título / Autor</th>
      <th onclick="setSort('lang')">Idioma</th>
      <th onclick="setSort('rating')">Goodreads</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="no-results" id="no-results" style="display:none">Sin resultados.</div>

// Top 3 per language
const top3ByLang = {};
Object.keys(LANGS).forEach(lk => {
  top3ByLang[lk] = raw.filter(b => b.lang === lk).sort((a,b) => a.rank - b.rank).slice(0,3).map(b => b.rank);
});
function getTop3Pos(book) {
  const arr = top3ByLang[book.lang];
  return arr ? arr.indexOf(book.rank) : -1;
}
const MEDALS = ['🥇','🥈','🥉'];

let sortKey = 'rank', sortDir = 1, activeLang = null, isDark = true;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.body.classList.toggle('light', !isDark);
  document.getElementById('toggle-icon').textContent  = isDark ? '☀️' : '🌙';
  document.getElementById('toggle-label').textContent = isDark ? 'Modo claro' : 'Modo oscuro';
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const map = {rank:'btn-rank', rating:'btn-rating', title:'btn-title', lang:'btn-lang'};
  if (map[key]) document.getElementById(map[key]).classList.add('active');
  render();
}

function toggleLang(lk) {
  activeLang = activeLang === lk ? null : lk;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  if (activeLang) document.querySelector(`.legend-item[data-lang="${activeLang}"]`).classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let data = [...raw];
  if (q) data = data.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
  if (activeLang) data = data.filter(b => b.lang === activeLang);
  data.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'title' || sortKey === 'lang') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  const tbody = document.getElementById('tbody');
  document.getElementById('no-results').style.display = data.length ? 'none' : 'block';
  document.getElementById('count-label').textContent = data.length + ' título' + (data.length !== 1 ? 's' : '');
  if (!data.length) { tbody.innerHTML = ''; return; }

  tbody.innerHTML = data.map(b => {
    const lc = LANGS[b.lang].color;
    const t3 = getTop3Pos(b);
    const isTop3 = t3 >= 0;
    const rankClass = b.rank <= 10 ? 'top10' : b.rank <= 25 ? 'top25' : '';
    const rowClass = isTop3 ? 'top3-row' : '';
    const barW = Math.round(((b.rating - 3.0) / 2.0) * 100);
    const badge = isTop3
      ? `<span class="top3-badge" style="background:${lc}22;color:${lc};border:1px solid ${lc}44">${MEDALS[t3]} #${t3+1} ${LANGS[b.lang].label}</span>`
      : '';
    return `<tr class="${rowClass}" style="--lang-color:${lc}">
      <td class="rank ${rankClass}">${b.rank}</td>
      <td class="title-col">
        <div class="title">${b.title}${badge}</div>
        <div class="author">${b.author}</div>
      </td>
      <td class="lang-cell">
        <span class="lang-tag" style="background:${lc}18;color:${lc};border:1px solid ${lc}33">${LANGS[b.lang].label}</span>
      </td>
      <td class="rating-cell">
        <div class="rating-inner">
          <span class="rating-num">${b.rating.toFixed(2)}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:linear-gradient(90deg,${lc}88,${lc})"></div></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// Build legend
document.getElementById('lang-legend').innerHTML =
  Object.entries(LANGS).map(([lk, lv]) => {
    const count = raw.filter(b => b.lang === lk).length;
    return `<div class="legend-item" data-lang="${lk}" onclick="toggleLang('${lk}')">
      <div class="legend-dot" style="background:${lv.color}"></div>
      ${lv.label} <span style="opacity:0.5">(${count})</span>
    </div>`;
  }).join('') + `<span class="legend-hint">Clic para filtrar por idioma</span>`;

render();
</script>
</body>
</html>
